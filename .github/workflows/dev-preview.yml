name: Publish dev preview branch

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Prepare static preview
        shell: bash
        run: |
          rm -rf /tmp/collabhub-dev
          mkdir -p /tmp/collabhub-dev
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.agents' \
            --exclude='*.zip' \
            ./ /tmp/collabhub-dev/
          echo 'dev.collabhub.rogaxiom.com' > /tmp/collabhub-dev/CNAME
          touch /tmp/collabhub-dev/.nojekyll

      - name: Publish to dev-pages
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git switch --orphan dev-pages
          git rm -rf . || true
          cp -a /tmp/collabhub-dev/. .
          git add .
          git commit -m 'Publish dev preview'
          git push --force origin dev-pages
